<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; padding: 40px; color: #333; line-height: 1.6; }
        @media print {
            @page { size: A4; margin: 0; }
            body { padding: 2cm; }
            .page-break { page-break-before: always; }
        }
        .header { text-align: center; border-bottom: 2px solid {{themeColor}}; padding-bottom: 20px; margin-bottom: 30px; }
        .title { font-size: 24pt; color: {{themeColor}}; margin: 0; }
        .subtitle { font-size: 12pt; color: #666; margin-top: 5px; }
        .section { margin-bottom: 30px; }
        .section-title { font-size: 16pt; font-weight: bold; color: {{themeColor}}; border-left: 5px solid {{themeColor}}; padding-left: 10px; margin-bottom: 15px; }
        .card { background: #f9f9f9; border-radius: 8px; padding: 15px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
        th { background: #f4f4f4; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 10pt; background: {{themeColor}}; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">{{reportTitle}}</h1>
        <p class="subtitle">生成时间：{{date}} | 班级：{{className}}</p>
    </div>

    <div class="section">
        <div class="section-title">总体表现评估</div>
        <div class="card">
            <p>本周班级平均掌握度为 <strong>{{avgMastery}}%</strong>。核心薄弱点集中在：<em>{{weakPoints}}</em>。</p>
        </div>
    </div>

    {{studentListSection}}

    <div class="footer" style="margin-top: 50px; text-align: center; font-size: 10pt; color: #999;">
        <p>由 Insight AI 智能学情系统自动生成</p>
    </div>
</body>
</html>
