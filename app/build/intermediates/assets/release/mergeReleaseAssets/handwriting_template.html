<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @font-face {
            font-family: 'HandwritingFont';
            src: url('file:///android_asset/fonts/{{FONT_NAME}}');
            /* Fallback font in case local asset is missing */
            unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: {{PAPER_COLOR}};
            font-family: 'HandwritingFont', 'cursive', sans-serif;
            color: #2c3e50;
        }

        #paper {
            min-height: 100vh;
            padding: 40px 60px;
            box-sizing: border-box;
            position: relative;
            /* Scan lighting effect */
            background-image: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.03) 100%);
            {{PAPER_BACKGROUND}}
        }

        .section {
            margin-bottom: 30px;
        }

        .title {
            text-align: center;
            font-size: 1.5em;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 10px;
        }

        .char-span {
            display: inline-block;
            white-space: pre-wrap;
            transform-origin: center center;
            transition: none;
        }

        /* Prevent page breaks inside lines if possible */
        .line-container {
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="paper">
        <div id="content-root">
            <div class="title" id="report-title"></div>
            <div id="main-content"></div>
        </div>
    </div>

    <script>
        function applyHandwriting(containerId, text, config) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            const lines = text.split('\n');
            
            lines.forEach(lineText => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'line-container';
                lineDiv.style.fontSize = config.fontSize + 'px';
                lineDiv.style.lineHeight = (config.fontSize * 1.8) + 'px';

                const chars = lineText.split('');
                chars.forEach(char => {
                    const span = document.createElement('span');
                    span.innerText = char;
                    span.className = 'char-span';

                    if (char !== ' ' && char !== '\t') {
                        // Apply Perturbations
                        const sJitter = 1 + (Math.random() * 2 - 1) * config.sizeJitter;
                        const rJitter = (Math.random() * 2 - 1) * config.rotationJitter;
                        const yJitter = (Math.random() * 2 - 1) * config.positionJitter;
                        const xJitter = (Math.random() * 2 - 1) * (config.spacingJitter / 2);
                        const blur = Math.random() * config.inkBlur;

                        span.style.transform = `scale(${sJitter}) rotate(${rJitter}deg) translate(${xJitter}px, ${yJitter}px)`;
                        span.style.textShadow = `0px 0px ${blur}px rgba(0,0,0,0.6)`;
                        
                        // Randomly vary opacity slightly for "ink drying" effect
                        span.style.opacity = 0.85 + Math.random() * 0.15;
                    }

                    lineDiv.appendChild(span);
                });
                
                container.appendChild(lineDiv);
            });
        }

        window.renderHandwritingReport = function(dataJson, configJson) {
            const data = JSON.parse(dataJson);
            const config = JSON.parse(configJson);
            
            document.getElementById('report-title').innerText = data.title;
            applyHandwriting('main-content', data.content, config);
            
            // Signal to Android that we are ready if needed
            console.log("RENDER_FINISHED");
        };
    </script>
</body>
</html>
